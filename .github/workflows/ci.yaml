on: [push, pull_request]

jobs:
  install:
    name: Install
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Pixi environment
        uses: prefix-dev/setup-pixi@v0.9.2

      - name: Colcon build
        run: pixi run install
